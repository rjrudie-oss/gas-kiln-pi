# Gas kiln controller configuration.
# Every value has a safe default in code; this file overrides them.

hardware:
  # Set false and fill in the pins/driver below when running on the Pi.
  simulate: true

  # Thermocouple amplifier (you have a MAX31856 breakout).
  thermocouple_driver: max31856
  thermocouple_cs_pin: D5      # BCM GPIO5 chip-select
  thermocouple_type: K         # K-type wire (usable to ~1260 C)

  # Valve: 12 V normally-closed solenoid switched by one relay channel.
  # valve_type: relay  -> on/off solenoid, time-proportioned (coarse control)
  #             servo  -> smooth throttle: servo on a ball/needle valve, PAIRED
  #                       with the solenoid below as the fail-safe cutoff
  valve_type: relay
  valve_relay_gpio: 17         # BCM pin -> relay IN1
  valve_relay_active_high: true  # SainSmart boards are often active-LOW: set false
  valve_pwm_window_s: 10.0     # slow-PWM period; 1 s loop -> 10% duty resolution
  # Optional: separate relay channel the watchdog uses to cut solenoid power.
  # Set to a real BCM pin (e.g. 27 -> relay IN2) if you run the watchdog.
  watchdog_relay_gpio: -1

  # Servo throttle (only used when valve_type: servo). The servo does the smooth
  # modulation; the relay/solenoid above stays wired as the independent fail-safe
  # cutoff (held open while firing, shut on any fault/e-stop/power loss).
  servo_gpio: 18               # BCM pin -> servo signal (18 supports hardware PWM)
  servo_closed_angle: -90.0    # angle at 0 % (gas throttled shut)
  servo_open_angle: 90.0       # angle at 100 % (full flame) -> ~90deg for a ball valve
  servo_min_pulse_us: 500.0    # tune to your servo's spec
  servo_max_pulse_us: 2500.0

# Chimney-damper linear actuator (4" 12 V actuator via an L298N H-bridge).
# Disabled by default; the core controller runs fine without it. Set
# enabled: true after wiring the L298N (see docs/WIRING.md).
damper:
  enabled: false
  driver: l298n
  in1_gpio: 23           # BCM -> L298N IN1
  in2_gpio: 24           # BCM -> L298N IN2
  enable_gpio: -1        # -1 = leave the L298N ENA jumper on (always enabled)
  stroke_time_s: 20.0    # seconds for one full stroke; time yours on the bench
  home_on_start: true    # retract to the limit once at startup to find 0 %
  invert: false          # flip if the actuator travels the wrong way
  default_percent: 0.0   # position held until the dashboard commands otherwise
  command_path: /run/kiln/damper

pid:
  kp: 2.0
  ki: 0.01
  kd: 15.0
  output_min: 0.0
  output_max: 100.0
  integral_limit: 100.0

safety:
  max_temp_c: 1250.0           # conservative for K-type
  max_rate_c_per_s: 10.0
  sensor_timeout_s: 5.0
  heartbeat_interval_s: 1.0
  heartbeat_timeout_s: 3.0
  heartbeat_path: /run/kiln/heartbeat
  estop_path: /run/kiln/estop

control:
  loop_interval_s: 1.0
  # Firing schedule: [target_C, ramp_C_per_hour, hold_minutes]
  # Example bisque-ish ramp (edit for your work). Empty list = valve stays closed.
  profile:
    - [120, 60, 30]     # drive off moisture, hold
    - [600, 150, 0]
    - [1000, 120, 20]   # target + soak

web:
  host: 0.0.0.0
  port: 8080
  poll_interval_s: 1.0
